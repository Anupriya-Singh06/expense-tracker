<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transactions</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Your Transactions</span>

    <div>
        <a href="/home" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="/add-transaction" class="btn btn-success btn-sm">Add New</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="card shadow p-3">

        <h4 class="mb-3 text-center">Transaction List</h4>

        <table class="table table-striped table-hover text-center">

            <thead class="table-dark">
            <tr>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="t : ${transactions}">
                <td th:text="${t.category}"></td>
                <td th:text="${t.amount}"></td>
                <td th:text="${t.dateTime}"></td>
            </tr>
            <tr class="table-secondary fw-bold">
                <td>Total</td>
                <td th:text="${totalAmount}"></td>
                <td></td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
