<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">My App</span>

    <div class="text-white">
        Welcome <span th:text="${#authentication.name}"></span>
    </div>

    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
</nav>

<!-- Main Content -->
<div class="container mt-5 text-center">

    <h2 class="mb-4">Home Page</h2>

    <!-- Roles -->
    <p class="text-muted" th:text="'Roles: ' + ${#authentication.authorities}"></p>

    <!-- Buttons -->
    <div class="mt-4">

        <a href="/transactions" class="btn btn-primary btn-lg mx-2">
            View Transactions
        </a>

        <a href="/add-transaction" class="btn btn-success btn-lg mx-2">
            Add Transaction
        </a>

    </div>

</div>

</body>
</html>
